<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2021-12-01</title>
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 50% 50%, #3a2b1c 0%, #1c1108 100%);
        }

        /* Art frame — rounded corners + soft shadow that dissolves into the background */
        #snake-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 90px 40px rgba(0, 0, 0, 0.65);
        }

        /* Info button */
        #info-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(30, 18, 8, 0.55);
            color: rgba(255, 255, 255, 0.45);
            font-family: Palatino, 'Palatino Linotype', 'Book Antiqua', serif;
            font-size: 15px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: border-color 0.2s, color 0.2s, background 0.2s;
            z-index: 100;
            user-select: none;
        }
        #info-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.8);
            background: rgba(30, 18, 8, 0.8);
        }

        /* Info panel */
        #info-panel {
            position: fixed;
            bottom: 60px;
            right: 24px;
            background: rgba(26, 16, 8, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 16px 20px;
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.7);
            font-family: Palatino, 'Palatino Linotype', 'Book Antiqua', serif;
            font-size: 15px;
            line-height: 1.8;
            letter-spacing: 0.02em;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transform: translateY(6px);
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
        }
        #info-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        #info-panel a {
            color: rgba(200, 170, 130, 0.9);
            text-decoration: none;
        }
        #info-panel a:hover {
            color: rgba(220, 195, 155, 1);
            text-decoration: underline;
        }

        /* Prevent viewport overflow on small screens */
        body {
            overflow: hidden;
        }

        /* Grain texture overlay — sits behind the art canvas */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            filter: url(#grain-filter);
            opacity: 0.35;
        }

    </style>
</head>

<body>
<!-- Info button -->
<div id="info-btn" title="About">i</div>
<div id="info-panel">
    <div>Flow Fields &mdash; Samma, 2021</div>
    <div><a href="mailto:samma@samma.no">samma@samma.no</a></div>
    <div><a href="https://opensea.io/collection/flowfields" target="_blank" rel="noopener">opensea.io/collection/flowfields</a></div>
    <div><a href="https://github.com/samma/samma-frontpage" target="_blank" rel="noopener">github.com/samma/samma-frontpage</a></div>
</div>
<script>
    (function () {
        var btn = document.getElementById('info-btn');
        var panel = document.getElementById('info-panel');
        btn.addEventListener('click', function (e) {
            e.stopPropagation();
            panel.classList.toggle('visible');
        });
        document.addEventListener('click', function () {
            panel.classList.remove('visible');
        });
        panel.addEventListener('click', function (e) {
            e.stopPropagation(); // keep panel open when clicking links inside
        });
    })();
</script>

<!-- Hidden SVG that defines the grain filter used by body::before -->
<svg width="0" height="0" style="position:absolute;overflow:hidden;">
    <defs>
        <filter id="grain-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
            <feColorMatrix type="saturate" values="0" in="noise"/>
        </filter>
    </defs>
</svg>
</body>

<!-- import the javascript library file(s) -->
<script src="https://unpkg.com/h264-mp4-encoder/embuild/dist/h264-mp4-encoder.web.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.min.js" crossorigin="anonymous"></script>
<script src="colorTable.js" type="text/javascript"></script>
<script src="util.js" type="text/javascript"></script>
<script src="Palette.js" type="text/javascript"></script>
<script src="Point.js" type="text/javascript"></script>
<script src="FlowField.js" type="text/javascript"></script>
<script src="recordVideos.js" type="text/javascript"></script>


<!-- border snake overlay -->
<script src="./snake.js"></script>

<!-- import the javascript sketch file -->
<script src="./sketch.js"></script>

<script data-goatcounter="https://samma-frontpage.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<script>
(function () {
    var PADDING = 24; // breathing room (px) on each side on mobile

    function scaleArtwork() {
        var container = document.getElementById('snake-container');
        if (!container || !container.offsetWidth) return;

        var natural = container.offsetWidth; // canvas is square
        var maxFit = Math.min(window.innerWidth, window.innerHeight) - PADDING * 2;
        var scale = Math.min(maxFit / natural, 1);

        if (scale < 1) {
            var pull = natural * (1 - scale) / 2; // negative margin to collapse unused layout space
            container.style.transform = 'scale(' + scale + ')';
            container.style.transformOrigin = 'center center';
            container.style.margin = (-pull) + 'px';
        } else {
            container.style.transform = '';
            container.style.margin = '';
        }
    }

    window.addEventListener('resize', scaleArtwork);

    // Poll until snake.js has created and populated #snake-container
    var poll = setInterval(function () {
        var c = document.getElementById('snake-container');
        if (c && c.offsetWidth > 0) {
            clearInterval(poll);
            scaleArtwork();
        }
    }, 100);
})();
</script>

</html>
